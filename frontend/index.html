<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>罗小黑 AI Town · 年夜饭</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0b08;
    color: #e2d4b0;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #header {
    padding: 8px 16px;
    background: #1a1208;
    border-bottom: 1px solid #3a2a10;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #header h1 { font-size: 15px; color: #e2b04a; letter-spacing: 0.05em; }
  #sim-time { font-size: 14px; color: #c8a060; font-variant-numeric: tabular-nums; font-weight: bold; }
  #status { font-size: 11px; color: #806040; margin-left: auto; }
  #btn-tick {
    background: #2a1c08; border: 1px solid #c49840; color: #e2b04a;
    padding: 3px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  #btn-tick:hover { background: #3a2c10; }
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  #canvas-wrap {
    flex-shrink: 0;
    position: relative;
    background: #181410;
    overflow: hidden;
  }
  canvas { display: block; }
  #log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    background: #100e08;
    border-left: 1px solid #2a1e0a;
    font-size: 12px;
    line-height: 1.7;
    min-width: 260px;
  }
  .log-entry {
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #1a1408;
  }
  .log-time { color: #604820; margin-right: 6px; font-size: 11px; }
  .log-name { font-weight: bold; margin-right: 4px; }
  .log-thought { color: #907850; font-style: italic; display: block; }
  .log-action { color: #c0a868; }
  .log-dialogue { color: #e8d090; }
  .log-mood { color: #809058; font-size: 10px; margin-left: 4px; }
  .log-system { color: #e2b04a; text-align: center; padding: 4px 0; }
</style>
</head>
<body>
<div id="header">
  <h1>罗小黑 AI Town · 哪吒家除夕夜年夜饭</h1>
  <div id="sim-time">18:00</div>
  <button id="btn-tick" title="跳过等待，立刻进入下一个tick">快进</button>
  <div id="status">连接中...</div>
</div>
<div id="main">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="log-panel"></div>
</div>

<script>
// ─── Room layout (mirroring floorplan-v5 SVG grid) ───────────────────────────
// Grid: 740×600, outer walls x=14/726, y=14/586
// Rows: y=100/262/424/586, Cols: x=14/190/545/726
const ROOMS = {
  '院子':   { x: 14,  y: 14,  w: 712, h: 86,  cx: 370, cy: 57,  fill: '#2a3828' },
  '厨房':   { x: 14,  y: 100, w: 176, h: 162, cx: 102, cy: 181, fill: '#282e38' },
  '餐厅':   { x: 190, y: 100, w: 355, h: 162, cx: 367, cy: 181, fill: '#2e2818' },
  '游戏室': { x: 545, y: 100, w: 181, h: 162, cx: 635, cy: 181, fill: '#28243a' },
  '衣帽间': { x: 14,  y: 262, w: 176, h: 162, cx: 102, cy: 343, fill: '#2e2820' },
  '客厅':   { x: 190, y: 262, w: 355, h: 162, cx: 367, cy: 343, fill: '#2e2818' },
  '次阳台': { x: 545, y: 262, w: 181, h: 162, cx: 635, cy: 343, fill: '#1e2e22' },
  '卧室':   { x: 14,  y: 424, w: 376, h: 162, cx: 202, cy: 505, fill: '#20282e' },
  '卫生间': { x: 390, y: 424, w: 336, h: 162, cx: 558, cy: 505, fill: '#1e2a28' },
};

const CHAR_COLORS = {
  '小黑': '#4a90d9',
  '无限': '#9b59b6',
  '哪吒': '#e74c3c',
  '鹿野': '#27ae60',
};

const NAMES = ['小黑', '无限', '哪吒', '鹿野'];
const SPRITE_R = 15;
const BUBBLE_DURATION = 4500;

// ─── Sprite state ─────────────────────────────────────────────────────────────
const sprites = {};
const INITIAL_ROOMS = { '小黑': '餐厅', '无限': '厨房', '哪吒': '客厅', '鹿野': '次阳台' };

function roomOffset(name) {
  const idx = NAMES.indexOf(name);
  const offs = [{ x: -20, y: -16 }, { x: 20, y: -16 }, { x: -20, y: 16 }, { x: 20, y: 16 }];
  return offs[idx] || { x: 0, y: 0 };
}

for (const name of NAMES) {
  const room = INITIAL_ROOMS[name];
  const r = ROOMS[room];
  const off = roomOffset(name);
  sprites[name] = { x: r.cx + off.x, y: r.cy + off.y, tx: r.cx + off.x, ty: r.cy + off.y, room, mood: '' };
}

// ─── Speech bubbles ───────────────────────────────────────────────────────────
const bubbles = []; // { name, text, bx, by, expiry }

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const CANVAS_W = 740;
const CANVAS_H = 600;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const avail = Math.min(window.innerHeight - 40, window.innerWidth - 260);
  const scale = Math.min(1, avail / CANVAS_H);
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width = (CANVAS_W * scale) + 'px';
  canvas.style.height = (CANVAS_H * scale) + 'px';
  wrap.style.width = (CANVAS_W * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function line(x1, y1, x2, y2) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

function arc(cx, cy, r, a0, a1) {
  ctx.beginPath(); ctx.arc(cx, cy, r, a0, a1); ctx.stroke();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function slidingDoorH(x, y, w) {
  // Horizontal Tang-style lattice
  ctx.save();
  ctx.strokeStyle = '#c49858'; ctx.lineWidth = 1;
  for (let i = 0; i <= w; i += 7) line(x + i, y - 3, x + i, y + 3);
  line(x, y, x + w, y);
  ctx.restore();
}

function slidingDoorV(x, y, h) {
  ctx.save();
  ctx.strokeStyle = '#c49858'; ctx.lineWidth = 1;
  for (let i = 0; i <= h; i += 7) line(x - 3, y + i, x + 3, y + i);
  line(x, y, x, y + h);
  ctx.restore();
}

// ─── Floor plan ───────────────────────────────────────────────────────────────
function drawFloorplan() {
  // Room fills
  for (const [name, r] of Object.entries(ROOMS)) {
    ctx.fillStyle = r.fill;
    ctx.fillRect(r.x, r.y, r.w, r.h);
  }

  // Room labels
  ctx.font = 'bold 11px PingFang SC, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(200,170,100,0.5)';
  const labelPos = [
    ['院子', 370, 28],
    ['厨房', 102, 113], ['餐厅', 367, 113], ['游戏室', 635, 113],
    ['衣帽间', 102, 275], ['客厅', 367, 275], ['次阳台', 635, 275],
    ['卧室', 130, 437], ['卫生间', 510, 437],
  ];
  for (const [lbl, lx, ly] of labelPos) ctx.fillText(lbl, lx, ly);

  // Outer wall
  ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 9;
  ctx.strokeRect(14, 14, 712, 572);

  // Inner walls
  ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 6;

  // y=100 horizontal (gaps for doors)
  line(14, 100, 79, 100);
  line(154, 100, 190, 100);
  line(190, 100, 306, 100);
  line(440, 100, 545, 100);
  line(545, 100, 558, 100);
  line(636, 100, 726, 100);

  // y=262 horizontal — no door between 厨房 and 衣帽间 (solid wall)
  line(14, 262, 726, 262);

  // y=424 horizontal
  line(14, 424, 726, 424);

  // x=190 vertical (y=100→424)
  line(190, 100, 190, 142);
  line(190, 208, 190, 300);
  line(190, 368, 190, 424);

  // x=545 vertical (y=100→424)
  line(545, 100, 545, 134);
  line(545, 200, 545, 296);
  line(545, 370, 545, 424);

  // x=390 vertical (y=424→586)
  line(390, 424, 390, 488);
  line(390, 554, 390, 586);

  // Swing door arcs
  ctx.strokeStyle = '#7a5030'; ctx.lineWidth = 1.5;
  arc(190, 142, 66, 0, Math.PI / 2);       // 厨房→餐厅
  arc(190, 300, 68, 0, Math.PI / 2);       // 衣帽间→客厅
  arc(390, 554, 66, -Math.PI / 2, 0);      // 卧室→卫生间

  // Sliding doors (Tang lattice)
  slidingDoorH(306, 100, 134);             // 院子↔餐厅
  slidingDoorV(545, 136, 62);             // 餐厅↔游戏室
  slidingDoorV(545, 298, 70);             // 客厅↔次阳台

  drawFurniture();
}

function drawFurniture() {
  // ── 厨房 (x14-190, y100-262) ──────────────────────────────────────────────
  // 灶台
  ctx.fillStyle = '#3a3020'; ctx.fillRect(20, 106, 80, 28);
  ctx.strokeStyle = '#7a6030'; ctx.lineWidth = 1;
  ctx.strokeRect(20, 106, 80, 28);
  // 灶眼 x2
  ctx.strokeStyle = '#c08040';
  ctx.beginPath(); ctx.arc(38, 120, 7, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(62, 120, 7, 0, Math.PI*2); ctx.stroke();
  // 冰箱
  ctx.fillStyle = '#2a3838'; ctx.fillRect(148, 106, 32, 50);
  ctx.strokeStyle = '#4a7060'; ctx.lineWidth = 1; ctx.strokeRect(148, 106, 32, 50);
  ctx.strokeStyle = '#3a5848'; ctx.lineWidth = 0.5; line(148, 131, 180, 131);
  // 岛台
  ctx.fillStyle = '#2e2818'; ctx.fillRect(30, 200, 120, 30);
  ctx.strokeStyle = '#7a6030'; ctx.lineWidth = 1; ctx.strokeRect(30, 200, 120, 30);

  // ── 餐厅 (x190-545, y100-262) ─────────────────────────────────────────────
  // 圆桌
  ctx.fillStyle = '#3a2c10';
  ctx.beginPath(); ctx.arc(367, 188, 42, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c49840'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(367, 188, 42, 0, Math.PI*2); ctx.stroke();
  // 4把椅子
  ctx.fillStyle = '#2a2010';
  for (const [cx, cy] of [[367,138],[417,188],[367,238],[317,188]]) {
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#8a6830'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.stroke();
  }
  // 酒柜 (右侧)
  ctx.fillStyle = '#2e1a08'; ctx.fillRect(500, 108, 36, 70);
  ctx.strokeStyle = '#7a4820'; ctx.lineWidth = 1; ctx.strokeRect(500, 108, 36, 70);
  ctx.strokeStyle = '#5a3010'; ctx.lineWidth = 0.5;
  line(500, 143, 536, 143); line(518, 108, 518, 178);
  // 火锅底座
  ctx.strokeStyle = '#c04020'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(367, 188, 20, 0, Math.PI*2); ctx.stroke();

  // ── 游戏室 (x545-726, y100-262) ───────────────────────────────────────────
  // 电竞桌
  ctx.fillStyle = '#1e1828'; ctx.fillRect(555, 108, 140, 32);
  ctx.strokeStyle = '#5040a0'; ctx.lineWidth = 1; ctx.strokeRect(555, 108, 140, 32);
  // 显示器 x2
  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(562, 110, 44, 24); ctx.fillRect(614, 110, 44, 24);
  ctx.strokeStyle = '#6050c0'; ctx.lineWidth = 0.8;
  ctx.strokeRect(562, 110, 44, 24); ctx.strokeRect(614, 110, 44, 24);
  // 电竞椅
  ctx.fillStyle = '#2a1818'; ctx.fillRect(608, 150, 36, 40);
  ctx.strokeStyle = '#a03030'; ctx.lineWidth = 1; ctx.strokeRect(608, 150, 36, 40);
  // Switch放桌上
  ctx.fillStyle = '#303040'; ctx.fillRect(570, 148, 28, 16);
  ctx.strokeStyle = '#4040a0'; ctx.lineWidth = 0.8; ctx.strokeRect(570, 148, 28, 16);

  // ── 衣帽间 (x14-190, y262-424) ────────────────────────────────────────────
  // 衣柜
  ctx.fillStyle = '#281c10'; ctx.fillRect(20, 268, 60, 70);
  ctx.strokeStyle = '#7a5020'; ctx.lineWidth = 1; ctx.strokeRect(20, 268, 60, 70);
  line(50, 268, 50, 338);
  // 鞋墙
  ctx.fillStyle = '#1e1a14'; ctx.fillRect(20, 348, 150, 38);
  ctx.strokeStyle = '#6a4818'; ctx.lineWidth = 1; ctx.strokeRect(20, 348, 150, 38);
  // 鞋格子
  for (let i = 0; i < 6; i++) {
    ctx.strokeStyle = '#4a3010'; ctx.lineWidth = 0.5;
    line(20 + i*25, 348, 20 + i*25, 386);
  }
  // 全身镜
  ctx.fillStyle = '#1a2028'; ctx.fillRect(148, 268, 26, 72);
  ctx.strokeStyle = '#c0a040'; ctx.lineWidth = 1.5; ctx.strokeRect(148, 268, 26, 72);
  // 镜框角装饰
  ctx.strokeStyle = '#e0c060'; ctx.lineWidth = 1;
  ctx.strokeRect(150, 270, 22, 68);

  // ── 客厅 (x190-545, y262-424) ─────────────────────────────────────────────
  // L形沙发
  ctx.fillStyle = '#2a2030';
  ctx.fillRect(210, 290, 160, 40);   // 主沙发
  ctx.fillRect(200, 290, 40, 80);    // 侧沙发
  ctx.strokeStyle = '#6050a0'; ctx.lineWidth = 1;
  ctx.strokeRect(210, 290, 160, 40);
  ctx.strokeRect(200, 290, 40, 80);
  // 懒人沙发
  ctx.fillStyle = '#281820';
  ctx.beginPath(); ctx.arc(430, 320, 22, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#8040a0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(430, 320, 22, 0, Math.PI*2); ctx.stroke();
  // 茶几
  ctx.fillStyle = '#1e1810'; ctx.fillRect(255, 340, 80, 40);
  ctx.strokeStyle = '#6a5020'; ctx.lineWidth = 1; ctx.strokeRect(255, 340, 80, 40);
  // 65寸TV + 柜
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(310, 398, 120, 16);
  ctx.strokeStyle = '#405060'; ctx.lineWidth = 1; ctx.strokeRect(310, 398, 120, 16);
  ctx.fillStyle = '#181818'; ctx.fillRect(295, 414, 150, 8);
  ctx.strokeStyle = '#304050'; ctx.lineWidth = 0.5; ctx.strokeRect(295, 414, 150, 8);
  // PS5 (白色小方块在TV柜旁)
  ctx.fillStyle = '#d8d8d8'; ctx.fillRect(440, 396, 18, 12);
  ctx.strokeStyle = '#0060c0'; ctx.lineWidth = 0.8; ctx.strokeRect(440, 396, 18, 12);

  // ── 次阳台 (x545-726, y262-424) ───────────────────────────────────────────
  // 藤椅 x2
  ctx.strokeStyle = '#6a7840'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(585, 310, 18, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(640, 310, 18, 0, Math.PI*2); ctx.stroke();
  // 大盆栽
  ctx.fillStyle = '#1a2810'; ctx.fillRect(670, 270, 36, 50);
  ctx.strokeStyle = '#3a5820'; ctx.lineWidth = 1; ctx.strokeRect(670, 270, 36, 50);
  // 植物叶子
  ctx.strokeStyle = '#4a8030'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(688, 265, 20, Math.PI, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(675, 260, 14, Math.PI+0.3, Math.PI*2-0.3); ctx.stroke();
  ctx.beginPath(); ctx.arc(700, 258, 14, Math.PI+0.3, Math.PI*2-0.3); ctx.stroke();
  // 灯笼（春节装饰）
  ctx.fillStyle = '#8a1010';
  ctx.beginPath(); ctx.arc(612, 278, 9, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(660, 278, 9, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(612, 278, 9, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(660, 278, 9, 0, Math.PI*2); ctx.stroke();

  // ── 卧室 (x14-390, y424-586) ──────────────────────────────────────────────
  // 特大号床
  ctx.fillStyle = '#1e2030'; ctx.fillRect(25, 445, 120, 100);
  ctx.strokeStyle = '#4050a0'; ctx.lineWidth = 1; ctx.strokeRect(25, 445, 120, 100);
  // 床头
  ctx.fillStyle = '#2a2840'; ctx.fillRect(25, 445, 120, 22);
  ctx.strokeStyle = '#6070c0'; ctx.lineWidth = 1; ctx.strokeRect(25, 445, 120, 22);
  // 床垫纹
  ctx.strokeStyle = '#303050'; ctx.lineWidth = 0.5;
  ctx.strokeRect(32, 470, 106, 70);
  // 智能面板
  ctx.fillStyle = '#101820'; ctx.fillRect(155, 450, 28, 18);
  ctx.strokeStyle = '#2060a0'; ctx.lineWidth = 1; ctx.strokeRect(155, 450, 28, 18);

  // ── 卫生间 (x390-726, y424-586) ───────────────────────────────────────────
  // 浴缸
  ctx.fillStyle = '#1a2830'; ctx.fillRect(400, 438, 80, 50);
  ctx.strokeStyle = '#3070a0'; ctx.lineWidth = 1.5; ctx.strokeRect(400, 438, 80, 50);
  ctx.strokeStyle = '#2050808'; ctx.lineWidth = 0.5; ctx.strokeRect(406, 444, 68, 38);
  // 独立淋浴
  ctx.fillStyle = '#1e2a28'; ctx.fillRect(500, 432, 50, 60);
  ctx.strokeStyle = '#408060'; ctx.lineWidth = 1; ctx.strokeRect(500, 432, 50, 60);
  // 莲蓬头
  ctx.strokeStyle = '#60a080'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(525, 444, 8, 0, Math.PI*2); ctx.stroke();
  // 马桶
  ctx.fillStyle = '#2a2820'; ctx.fillRect(618, 455, 36, 46);
  ctx.strokeStyle = '#706050'; ctx.lineWidth = 1; ctx.strokeRect(618, 455, 36, 46);
  ctx.fillStyle = '#222018'; ctx.fillRect(614, 452, 44, 14);
  ctx.strokeStyle = '#605040'; ctx.lineWidth = 0.8; ctx.strokeRect(614, 452, 44, 14);
}

// ─── Character avatar drawers ─────────────────────────────────────────────────
// Each draws a ~30×36px chibi portrait centered at (0,0), call with ctx translated

function drawXiaohei(x, y) {
  ctx.save(); ctx.translate(x, y);
  // Body
  ctx.fillStyle = '#2a4a7a'; ctx.beginPath(); ctx.arc(0, 4, 11, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
  // Cat ears
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath(); ctx.moveTo(-9,-15); ctx.lineTo(-5,-8); ctx.lineTo(-2,-13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(9,-15); ctx.lineTo(5,-8); ctx.lineTo(2,-13); ctx.closePath(); ctx.fill();
  // Inner ear
  ctx.fillStyle = '#4a3050';
  ctx.beginPath(); ctx.moveTo(-8,-14); ctx.lineTo(-5,-9); ctx.lineTo(-3,-13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(8,-14); ctx.lineTo(5,-9); ctx.lineTo(3,-13); ctx.closePath(); ctx.fill();
  // Eyes (blue)
  ctx.fillStyle = '#4a90d9';
  ctx.beginPath(); ctx.arc(-3.5,-8,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-8,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-3.5,-8,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-8,1.2,0,Math.PI*2); ctx.fill();
  // Tiny nose
  ctx.fillStyle = '#d08060';
  ctx.beginPath(); ctx.arc(0,-5.5,1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawWuxian(x, y) {
  ctx.save(); ctx.translate(x, y);
  // Body (purple robe)
  ctx.fillStyle = '#6a3a8a'; ctx.beginPath(); ctx.arc(0, 4, 11, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#f0d8c0'; ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
  // Hair (silver/white)
  ctx.fillStyle = '#c8d8e8';
  ctx.beginPath(); ctx.arc(0,-14,8,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-10,-12); ctx.lineTo(-12,-2); ctx.lineTo(-8,-8); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,-12); ctx.lineTo(12,-2); ctx.lineTo(8,-8); ctx.closePath(); ctx.fill();
  // Elf ears
  ctx.fillStyle = '#f0d8c0';
  ctx.beginPath(); ctx.moveTo(-10,-7); ctx.lineTo(-15,-4); ctx.lineTo(-9,-3); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,-7); ctx.lineTo(15,-4); ctx.lineTo(9,-3); ctx.closePath(); ctx.fill();
  // Eyes (gentle violet)
  ctx.fillStyle = '#9b59b6';
  ctx.beginPath(); ctx.arc(-3,-8,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-8,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a28';
  ctx.beginPath(); ctx.arc(-3,-8,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-8,1,0,Math.PI*2); ctx.fill();
  // Small smile
  ctx.strokeStyle = '#c09080'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0,-4,3,0.2,Math.PI-0.2); ctx.stroke();
  ctx.restore();
}

function drawNezha(x, y) {
  ctx.save(); ctx.translate(x, y);
  // Body (red)
  ctx.fillStyle = '#c0281a'; ctx.beginPath(); ctx.arc(0, 4, 11, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#f5e0c0'; ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
  // Hair (black bun x2 — 双丫髻)
  ctx.fillStyle = '#1a1010';
  ctx.beginPath(); ctx.arc(-6,-17,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-17,5,0,Math.PI*2); ctx.fill();
  // Hair base
  ctx.beginPath(); ctx.arc(0,-13,8,Math.PI,0); ctx.fill();
  // Eyes (sharp/playful)
  ctx.fillStyle = '#1a0800';
  ctx.beginPath(); ctx.arc(-3.5,-8,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-8,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff6040';
  ctx.beginPath(); ctx.arc(-3.5,-8,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-8,1,0,Math.PI*2); ctx.fill();
  // Smirk
  ctx.strokeStyle = '#c08060'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(-3,-4); ctx.quadraticCurveTo(1,-2,4,-5); ctx.stroke();
  // Gold forehead jewel
  ctx.fillStyle = '#f0c000';
  ctx.beginPath(); ctx.arc(0,-13,2.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawLuye(x, y) {
  ctx.save(); ctx.translate(x, y);
  // Body (green)
  ctx.fillStyle = '#1a6830'; ctx.beginPath(); ctx.arc(0, 4, 11, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#e8d8b0'; ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
  // Hair (dark brown)
  ctx.fillStyle = '#2a1808';
  ctx.beginPath(); ctx.arc(0,-14,8,Math.PI,0); ctx.fill();
  // Deer antlers
  ctx.strokeStyle = '#8a5020'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-4,-16); ctx.lineTo(-7,-24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7,-24); ctx.lineTo(-10,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7,-24); ctx.lineTo(-5,-19); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,-16); ctx.lineTo(7,-24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-24); ctx.lineTo(10,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-24); ctx.lineTo(5,-19); ctx.stroke();
  ctx.lineCap = 'butt';
  // Eyes (calm, amber)
  ctx.fillStyle = '#8a6020';
  ctx.beginPath(); ctx.arc(-3.5,-8,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-8,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0800';
  ctx.beginPath(); ctx.arc(-3.5,-8,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-8,1,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

const AVATAR_DRAWERS = { '小黑': drawXiaohei, '无限': drawWuxian, '哪吒': drawNezha, '鹿野': drawLuye };

// ─── Sprites ──────────────────────────────────────────────────────────────────
function drawSprites() {
  for (const name of NAMES) {
    const s = sprites[name];
    // Smooth lerp
    s.x += (s.tx - s.x) * 0.1;
    s.y += (s.ty - s.y) * 0.1;

    const color = CHAR_COLORS[name];

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

    // Draw avatar
    const drawer = AVATAR_DRAWERS[name];
    if (drawer) drawer(s.x, s.y);

    ctx.shadowBlur = 0;

    // Name tag below
    ctx.fillStyle = 'rgba(10,6,2,0.75)';
    ctx.font = '9px PingFang SC, sans-serif';
    ctx.textAlign = 'center';
    const nw = ctx.measureText(name).width + 8;
    roundRect(s.x - nw/2, s.y + 16, nw, 13, 3);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(name, s.x, s.y + 26);

    // Mood tag
    if (s.mood) {
      ctx.fillStyle = 'rgba(10,6,2,0.75)';
      ctx.font = '9px PingFang SC, sans-serif';
      const mw = ctx.measureText(s.mood).width + 6;
      roundRect(s.x - mw/2, s.y + 30, mw, 12, 3);
      ctx.fill();
      ctx.fillStyle = color;
      ctx.fillText(s.mood, s.x, s.y + 40);
    }
  }
}

// ─── Bubbles ──────────────────────────────────────────────────────────────────
function wrapText(text, maxW) {
  ctx.font = '12px PingFang SC, sans-serif';
  const lines = [];
  let line = '';
  for (const ch of text) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line); line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function drawBubbles() {
  const now = Date.now();
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    if (now > b.expiry) { bubbles.splice(i, 1); continue; }

    const alpha = Math.min(1, (b.expiry - now) / 600);
    ctx.globalAlpha = alpha;

    const maxW = 150;
    const lines = wrapText(b.text, maxW);
    const bw = maxW + 18;
    const bh = lines.length * 17 + 12;
    const color = CHAR_COLORS[b.name] || '#ccc';

    // Clamp bubble position to canvas
    let bx = b.sx - bw / 2;
    let by = b.sy - 22 - bh - 6;  // 22px = top of avatar head above center
    bx = Math.max(4, Math.min(CANVAS_W - bw - 4, bx));
    by = Math.max(4, by);

    // Background
    ctx.fillStyle = 'rgba(18,12,4,0.92)';
    roundRect(bx, by, bw, bh, 6);
    ctx.fill();

    // Border
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    roundRect(bx, by, bw, bh, 6);
    ctx.stroke();

    // Tail
    const tailX = Math.max(bx + 10, Math.min(bx + bw - 10, b.sx));
    ctx.beginPath();
    ctx.moveTo(tailX - 5, by + bh);
    ctx.lineTo(tailX, by + bh + 8);
    ctx.lineTo(tailX + 5, by + bh);
    ctx.fillStyle = 'rgba(18,12,4,0.92)';
    ctx.fill();

    // Text
    ctx.fillStyle = '#e8d090';
    ctx.font = '12px PingFang SC, sans-serif';
    ctx.textAlign = 'left';
    lines.forEach((ln, i) => ctx.fillText(ln, bx + 9, by + 15 + i * 17));

    ctx.globalAlpha = 1;
  }
}

// ─── Render loop ──────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawFloorplan();
  drawSprites();
  drawBubbles();
  requestAnimationFrame(render);
}
render();

// ─── Log panel ────────────────────────────────────────────────────────────────
const logPanel = document.getElementById('log-panel');
const simTimeEl = document.getElementById('sim-time');
const statusEl = document.getElementById('status');

function addLog(html) {
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = html;
  logPanel.prepend(div);
  while (logPanel.children.length > 300) logPanel.removeChild(logPanel.lastChild);
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
let activeWs = null;

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  activeWs = ws;

  ws.onopen = () => { statusEl.textContent = '已连接'; };
  ws.onclose = () => {
    activeWs = null;
    statusEl.textContent = '已断开，5秒后重连...';
    setTimeout(connect, 5000);
  };
  ws.onerror = () => { statusEl.textContent = '连接错误'; };
  ws.onmessage = ({ data }) => {
    try { handle(JSON.parse(data)); } catch (e) { console.error(e); }
  };
}

function handle(ev) {
  switch (ev.type) {
    case 'tick_start':
      simTimeEl.textContent = ev.sim_time;
      break;

    case 'agent_action': {
      const { name, room, action, dialogue, mood, thought } = ev;
      const s = sprites[name];
      if (!s) break;

      // Move sprite target to new room center + offset
      if (room && ROOMS[room]) {
        const r = ROOMS[room];
        const off = roomOffset(name);
        s.tx = r.cx + off.x;
        s.ty = r.cy + off.y;
        s.room = room;
      }
      if (mood) s.mood = mood;

      // Speech bubble
      if (dialogue && dialogue.trim()) {
        bubbles.push({ name, text: dialogue, sx: s.x, sy: s.y, expiry: Date.now() + BUBBLE_DURATION });
      }

      // Log
      const color = CHAR_COLORS[name] || '#aaa';
      addLog(
        `<span class="log-time">${simTimeEl.textContent}</span>` +
        `<span class="log-name" style="color:${color}">${name}</span>` +
        (thought ? `<span class="log-thought">${thought}</span>` : '') +
        (action ? `<span class="log-action">${action}</span>` : '') +
        (dialogue ? ` <span class="log-dialogue">「${dialogue}」</span>` : '') +
        (mood ? `<span class="log-mood">[${mood}]</span>` : '')
      );
      break;
    }

    case 'world_update':
      simTimeEl.textContent = ev.sim_time;
      if (ev.moods) {
        for (const [name, mood] of Object.entries(ev.moods)) {
          if (sprites[name]) sprites[name].mood = mood;
        }
      }
      if (ev.positions) {
        for (const [name, room] of Object.entries(ev.positions)) {
          const s = sprites[name];
          if (s && ROOMS[room]) {
            const r = ROOMS[room];
            const off = roomOffset(name);
            s.tx = r.cx + off.x;
            s.ty = r.cy + off.y;
            s.room = room;
          }
        }
      }
      break;

    case 'agent_reaction': {
      const { name, dialogue, action, mood, in_reply_to } = ev;
      const s = sprites[name];
      if (!s) break;
      if (mood) s.mood = mood;
      if (dialogue && dialogue.trim()) {
        bubbles.push({ name, text: dialogue, sx: s.x, sy: s.y, expiry: Date.now() + BUBBLE_DURATION });
      }
      const color = CHAR_COLORS[name] || '#aaa';
      addLog(
        `<span class="log-time">${simTimeEl.textContent}</span>` +
        `<span class="log-name" style="color:${color}">${name}</span>` +
        `<span style="color:#605040;font-size:10px"> 回应${in_reply_to}</span> ` +
        (action ? `<span class="log-action">${action}</span>` : '') +
        (dialogue ? ` <span class="log-dialogue">「${dialogue}」</span>` : '')
      );
      break;
    }

    case 'agent_plan': {
      const { name, plan } = ev;
      const color = CHAR_COLORS[name] || '#aaa';
      if (plan && plan.length) {
        addLog(
          `<span class="log-name" style="color:${color}">${name}</span>` +
          `<span style="color:#507050;font-size:10px"> 今晚计划：</span>` +
          `<span class="log-thought">${plan.slice(0,3).join(' / ')}</span>`
        );
      }
      break;
    }

    case 'agent_reflection': {
      const { name, insights, sim_time } = ev;
      const color = CHAR_COLORS[name] || '#aaa';
      addLog(
        `<span class="log-time">${sim_time}</span>` +
        `<span class="log-name" style="color:${color}">${name}</span>` +
        `<span style="color:#806080;font-size:10px"> [反思] </span>` +
        `<span class="log-thought">${insights[0]}</span>`
      );
      break;
    }

    case 'planning_start':
      addLog(`<span class="log-system">— 角色规划今晚行程中... —</span>`);
      break;

    case 'simulation_end':
      statusEl.textContent = `模拟结束`;
      addLog(`<span class="log-system">—— 除夕夜结束 ${ev.sim_time} ——</span>`);
      break;
  }
}

document.getElementById('btn-tick').addEventListener('click', () => {
  if (activeWs && activeWs.readyState === WebSocket.OPEN) {
    activeWs.send(JSON.stringify({ type: 'force_tick' }));
  }
});

connect();
</script>
