<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>罗小黑 AI Town · 年夜饭</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0b08;
    color: #e2d4b0;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #header {
    padding: 8px 16px;
    background: #1a1208;
    border-bottom: 1px solid #3a2a10;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #header h1 { font-size: 15px; color: #e2b04a; letter-spacing: 0.05em; }
  #sim-time { font-size: 14px; color: #c8a060; font-variant-numeric: tabular-nums; font-weight: bold; }
  #status { font-size: 11px; color: #806040; margin-left: auto; }
  #btn-tick, #btn-news {
    background: #2a1c08; border: 1px solid #c49840; color: #e2b04a;
    padding: 3px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  #btn-tick:hover, #btn-news:hover { background: #3a2c10; }
  #btn-news.loading { opacity: 0.5; cursor: default; }
  #inject-bar {
    display: flex; gap: 6px; padding: 6px 10px;
    background: #100e08; border-top: 1px solid #2a1e0a; flex-shrink: 0;
  }
  #inject-input {
    flex: 1; background: #1a1408; border: 1px solid #3a2a10; color: #e2d4b0;
    border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: inherit;
    outline: none;
  }
  #inject-input:focus { border-color: #c49840; }
  #inject-input::placeholder { color: #604828; }
  #btn-inject {
    background: #2a1c08; border: 1px solid #c49840; color: #e2b04a;
    padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  #btn-inject:hover { background: #3a2c10; }
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }
  #canvas-wrap {
    flex-shrink: 0;
    background: #181410;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: stretch;
  }
  #canvas-inner {
    position: relative;
    flex-shrink: 0;
    overflow: hidden;
  }
  canvas { display: block; image-rendering: pixelated; }
  #label-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 2;
  }
  #bubble-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 3;
  }
  .html-bubble {
    position: absolute;
    background: rgba(18,12,4,0.92);
    border: 1.5px solid;
    border-radius: 6px;
    padding: 5px 9px 5px 9px;
    max-width: 160px;
    transform: translate(-50%, calc(-100% - 10px));
    transition: opacity 0.2s;
  }
  .bubble-text {
    font: 12px 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #e8d090;
    line-height: 1.5;
    white-space: normal;
    word-break: break-all;
  }
  .bubble-tail {
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 8px solid rgba(18,12,4,0.92);
  }
  .char-label {
    position: absolute;
    transform: translate(-50%, 0);
    text-align: center;
    line-height: 1.3;
  }
  .char-name {
    font: bold 11px 'PingFang SC', 'Microsoft YaHei', sans-serif;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    white-space: nowrap;
  }
  .char-mood {
    font: 10px 'PingFang SC', 'Microsoft YaHei', sans-serif;
    opacity: 0.9;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    white-space: nowrap;
  }
  #log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    background: #100e08;
    border-left: 1px solid #2a1e0a;
    font-size: 12px;
    line-height: 1.7;
    min-width: 260px;
  }
  .log-entry {
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #1a1408;
  }
  .log-time { color: #604820; margin-right: 6px; font-size: 11px; }
  .log-name { font-weight: bold; margin-right: 4px; }
  .log-thought { color: #907850; font-style: italic; display: block; }
  .log-action { color: #c0a868; }
  .log-dialogue { color: #e8d090; }
  .log-mood { color: #809058; font-size: 10px; margin-left: 4px; }
  .log-system { color: #e2b04a; text-align: center; padding: 4px 0; }
</style>
</head>
<body>
<div id="header">
  <h1>罗小黑 AI Town · 哪吒家除夕夜年夜饭</h1>
  <div id="sim-time">18:00</div>
  <button id="btn-tick" title="跳过等待，立刻进入下一个tick">快进</button>
  <button id="btn-pause" title="暂停/恢复时间轴">暂停</button>
  <button id="btn-news" title="抓取今日新闻并映射为公寓事件">今日新闻</button>
  <button id="btn-export" title="导出完整对话日志">导出日志</button>
  <div id="status">连接中...</div>
</div>
<div id="main">
  <div id="canvas-wrap">
    <div id="canvas-inner">
      <canvas id="canvas"></canvas>
      <div id="label-overlay"></div>
      <div id="bubble-overlay"></div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;flex:1;min-width:260px;overflow:hidden;">
    <div id="log-panel" style="flex:1;min-width:0;"></div>
    <div id="inject-bar">
      <input id="inject-input" type="text" placeholder="输入事件注入模拟（如：小黑切菜划伤了手）" maxlength="80"/>
      <button id="btn-inject">注入</button>
    </div>
  </div>
</div>

<script>
// ─── Room layout (style-e pixel art layout) ───────────────────────────────────
// Grid: 800×520, Row0 y=0-180, Row1 y=180-360, Row2 y=360-520
const ROOMS = {
  '院子':   { x: 0,   y: 0,   w: 200, h: 180, cx: 100, cy: 90  },
  '厨房':   { x: 200, y: 0,   w: 200, h: 180, cx: 300, cy: 90  },
  '餐厅':   { x: 400, y: 0,   w: 200, h: 180, cx: 500, cy: 90  },
  '游戏室': { x: 600, y: 0,   w: 200, h: 180, cx: 700, cy: 90  },
  '衣帽间': { x: 0,   y: 180, w: 200, h: 180, cx: 100, cy: 270 },
  '客厅':   { x: 200, y: 180, w: 400, h: 180, cx: 400, cy: 270 },
  '次阳台': { x: 600, y: 180, w: 200, h: 180, cx: 700, cy: 270 },
  '卧室':   { x: 0,   y: 360, w: 250, h: 160, cx: 125, cy: 440 },
  '主卫':   { x: 250, y: 360, w: 180, h: 160, cx: 340, cy: 440 },
  '客卫':   { x: 430, y: 360, w: 120, h: 160, cx: 490, cy: 440 },
  '卫生间': { x: 250, y: 360, w: 300, h: 160, cx: 400, cy: 440 }, // compat alias
};

const CHAR_COLORS = {
  '小黑': '#4a90d9',
  '无限': '#9b59b6',
  '哪吒': '#e74c3c',
  '鹿野': '#27ae60',
};

const NAMES = ['小黑', '无限', '哪吒', '鹿野'];
const SPRITE_R = 15;
const BUBBLE_DURATION = 4500;

// ─── Sprite state ─────────────────────────────────────────────────────────────
const sprites = {};
const INITIAL_ROOMS = { '小黑': '餐厅', '无限': '厨房', '哪吒': '客厅', '鹿野': '次阳台' };

// Fixed seat assignments per room per character (dx/dy from room center)
// Derived from actual furniture pixel positions in drawFloorplan()
const ROOM_SEATS = {
  // 圆形餐桌中心 (500,90) r≈52，四个方位坐席
  // room center cx=500 cy=90
  '餐厅': {
    '小黑': { dx:   0, dy: -62 },  // 北 → (500, 28)
    '无限': { dx:   0, dy:  62 },  // 南 → (500, 152)
    '哪吒': { dx: -65, dy:   0 },  // 西 → (435, 90)
    '鹿野': { dx:  65, dy:   0 },  // 东 → (565, 90)
  },
  // 客厅沙发：横沙发 sofa(204,183,180,42,'top') 坐区 y≈215
  //           竖沙发 sofa(388,183,44,134,'right') 坐区 x≈402
  // room center cx=400 cy=270
  '客厅': {
    '小黑': { dx: -155, dy: -55 },  // 横沙发左: (245, 215)
    '无限': { dx:  -55, dy: -55 },  // 横沙发右: (345, 215)
    '哪吒': { dx:    2, dy: -52 },  // 竖沙发上: (402, 218)
    '鹿野': { dx:    2, dy:  25 },  // 竖沙发下: (402, 295)
  },
  // 次阳台两张躺椅：lounger(608,292,46,52) lounger(744,292,46,52)
  // room center cx=700 cy=270
  '次阳台': {
    '小黑': { dx: -69, dy:  48 },  // 左躺椅: (631, 318)
    '无限': { dx:  67, dy:  48 },  // 右躺椅: (767, 318)
    '哪吒': { dx: -69, dy:  48 },
    '鹿野': { dx:  67, dy:  48 },
  },
};

// Spread characters in a room; use fixed seats if defined, else dynamic slots
function rebalanceRoom(roomName) {
  const room = ROOMS[roomName];
  if (!room) return;
  const inRoom = NAMES.filter(n => sprites[n] && sprites[n].room === roomName);
  const fixed = ROOM_SEATS[roomName];
  if (fixed) {
    inRoom.forEach(name => {
      const s = fixed[name] || { dx: 0, dy: 0 };
      sprites[name].tx = room.cx + s.dx;
      sprites[name].ty = room.cy + s.dy;
    });
    return;
  }
  // Fallback: seat around table dynamically
  const n = inRoom.length;
  const slots = [
    { dx:   0, dy: -45 },
    { dx:   0, dy:  45 },
    { dx: -55, dy:   0 },
    { dx:  55, dy:   0 },
  ];
  const used = n === 1 ? [{ dx: 0, dy: 0 }]
    : n === 2 ? [slots[0], slots[1]]
    : n === 3 ? [slots[0], slots[2], slots[3]]
    : slots;
  inRoom.forEach((name, i) => {
    const s = used[i] || { dx: 0, dy: 0 };
    sprites[name].tx = room.cx + s.dx;
    sprites[name].ty = room.cy + s.dy;
  });
}

for (const name of NAMES) {
  const room = INITIAL_ROOMS[name];
  const r = ROOMS[room];
  sprites[name] = { x: r.cx, y: r.cy, tx: r.cx, ty: r.cy, room, mood: '' };
}
// Spread initial positions
const initialRoomNames = [...new Set(Object.values(INITIAL_ROOMS))];
initialRoomNames.forEach(rebalanceRoom);
// Snap to target immediately
for (const name of NAMES) { sprites[name].x = sprites[name].tx; sprites[name].y = sprites[name].ty; }

// ─── Speech bubbles ───────────────────────────────────────────────────────────
const bubbles = []; // { name, text, bx, by, expiry }

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const CANVAS_W = 800;
const CANVAS_H = 520;

let currentScale = 1;
function resizeCanvas() {
  const inner = document.getElementById('canvas-inner');
  const mainEl = document.getElementById('main');
  const availH = mainEl.clientHeight || (window.innerHeight - 60);
  const availW = (mainEl.clientWidth || window.innerWidth) - 280;
  currentScale = Math.min(1, availH / CANVAS_H, availW / CANVAS_W);
  const w = Math.round(CANVAS_W * currentScale);
  const h = Math.round(CANVAS_H * currentScale);
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  inner.style.width = w + 'px';
  inner.style.height = h + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── Drawing helpers ──────────────────────────────────────────────────────────
// roundRect creates a path only (used by drawBubbles which fills/strokes separately)
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── Style-E pixel art helpers ────────────────────────────────────────────────
const P={
  bg:'#070710',
  wall:'#141428',wallH:'#1e1e38',wallL:'#0a0a1a',
  door:'#d4a830',doorS:'#8a6010',doorH:'#f0c850',
  f_yard:'#1c3018',f_kit:'#281c18',f_din:'#181c28',
  f_game:'#201e14',f_ward:'#182024',f_liv:'#221820',
  f_bal:'#182420',f_bed:'#14162a',f_mbath:'#1a2828',f_gbath:'#182222',
  wd:'#3a2010',wd2:'#5a3a18',wd3:'#8a6030',wdH:'#c0903a',wdL:'#241408',
  s1:'#5a2848',s2:'#7a3860',s3:'#9a5880',sH:'#c07898',
  b1:'#20204a',b2:'#303068',b3:'#5050a0',bH:'#8888cc',
  pil:'#d8d4ec',pilH:'#f0eeff',
  cnt:'#3a2a1a',cnt2:'#5a4028',cntH:'#8a6840',
  stv:'#1a1a1a',stv2:'#282828',fire:'#ff4400',fire2:'#ff8800',
  frig:'#2a3a3a',frig2:'#3a5050',frigH:'#6a8888',
  snk:'#1a3030',snk2:'#2a5050',wtr:'#3a7888',
  tbl:'#201828',tblE:'#3a2840',tblH:'#5a4060',
  hp:'#1a1212',hpR:'#cc1800',hpG:'#ff4400',
  plt:'#d8d8d8',pltI:'#b8b8b8',chop:'#7a4a18',
  rug1:'#2a1020',rug2:'#3a1830',rugP:'rgba(180,60,120,0.25)',
  tv1:'#0a0a0a',tv2:'#141414',tvS:'#0a1a2a',tvG:'#1a3a5a',
  wc1:'#c0c8c0',wc2:'#a0b0a0',wcI:'#78909a',
  bt1:'#ccd4d0',bt2:'#a0b8b4',btW:'#3a6878',
  gr1:'#1a3a14',gr2:'#2a5a1e',gr3:'#3a7a28',gr4:'#5a9a40',
  pot:'#6a3a1a',pot2:'#8a5a30',
  st1:'#2a2a30',st2:'#3a3a42',st3:'#5a5a62',
  lan:'#cc1800',lan2:'#ee3a00',lanH:'#ff7a00',
  label:'#e8be28',
  handle:'#a07030',
};
const r=(x,y,w,h,c)=>{if(w>0&&h>0){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}};
const s=(x,y,w,h,c,lw=1)=>{ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.strokeRect(x+.5,y+.5,w-1,h-1);};
const ci=(x,y,rad,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fill();};
const ri=(x,y,rad,c,lw=1.5)=>{ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.stroke();};
const ln=(x1,y1,x2,y2,c,lw=1)=>{ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();};
function glowC(x,y,rad,c){
  const g=ctx.createRadialGradient(x,y,0,x,y,rad);
  g.addColorStop(0,c);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);ctx.fill();
}
function rrect(x,y,w,h,rad,c){
  ctx.fillStyle=c;ctx.beginPath();
  ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rad);
  ctx.lineTo(x+w,y+h-rad);ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
  ctx.lineTo(x+rad,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rad);
  ctx.lineTo(x,y+rad);ctx.quadraticCurveTo(x,y,x+rad,y);ctx.closePath();ctx.fill();
}
function floorTile(x,y,w,h,base,lineC,ts=16){
  r(x,y,w,h,base);
  ctx.strokeStyle=lineC||'rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(let gx=x;gx<=x+w;gx+=ts) ln(gx,y,gx,y+h,lineC||'rgba(255,255,255,0.03)',0.5);
  for(let gy=y;gy<=y+h;gy+=ts) ln(x,gy,x+w,gy,lineC||'rgba(255,255,255,0.03)',0.5);
}
function woodFloor(x,y,w,h,base){
  r(x,y,w,h,base);
  ctx.strokeStyle='rgba(255,200,80,0.05)';ctx.lineWidth=0.5;
  for(let gy=y;gy<=y+h;gy+=8) ln(x,gy,x+w,gy,'rgba(255,200,80,0.05)',0.5);
  for(let gx=x+8;gx<x+w;gx+=40){
    const off=(Math.floor((gx-x)/40)*16)%h;
    ln(gx,y+off,gx,y+off+20,'rgba(0,0,0,0.12)',0.5);
  }
}
function roomLabel(name,x,y){
  ctx.font='bold 11px monospace';ctx.textBaseline='top';ctx.textAlign='left';
  const tw=ctx.measureText(name).width;
  rrect(x,y,tw+8,15,3,'rgba(0,0,0,0.75)');
  ctx.fillStyle=P.label;ctx.fillText(name,x+4,y+2);
}

// ─── Floor plan (style-e pixel art) ───────────────────────────────────────────
function drawFloorplan() {
  r(0,0,800,520,P.bg);

  // ── Floors ──────────────────────────────────────────────────────────────────
  woodFloor(0,0,200,180,P.f_yard);
  woodFloor(200,0,200,180,P.f_kit);
  floorTile(400,0,200,180,P.f_din,'rgba(100,100,200,0.04)');
  floorTile(600,0,200,180,P.f_game,'rgba(200,200,50,0.03)');
  floorTile(0,180,200,180,P.f_ward,'rgba(100,200,200,0.04)',12);
  woodFloor(200,180,400,180,P.f_liv);
  woodFloor(600,180,200,180,P.f_bal);
  floorTile(0,360,250,160,P.f_bed,'rgba(80,80,200,0.04)');
  floorTile(250,360,180,160,P.f_mbath,'rgba(80,200,200,0.06)',8);
  floorTile(430,360,120,160,P.f_gbath,'rgba(80,200,180,0.05)',8);

  // ── Walls ───────────────────────────────────────────────────────────────────
  function wallLine(x1,y1,x2,y2){ln(x1,y1,x2,y2,P.wallH,3);ln(x1+1,y1+1,x2+1,y2+1,P.wallL,1);}
  ctx.strokeStyle=P.wallH;ctx.lineWidth=4;ctx.strokeRect(2,2,796,516);
  wallLine(0,180,600,180);wallLine(0,360,600,360);
  wallLine(200,0,200,180);wallLine(400,0,400,180);wallLine(600,0,600,520);
  wallLine(200,180,200,360);
  wallLine(250,360,250,520);wallLine(430,360,430,520);
  wallLine(600,180,600,360);

  // ── Doors ───────────────────────────────────────────────────────────────────
  function door(x,y,horiz){
    const dw=22,dh=5;
    if(horiz){
      r(x-dw/2,y-2,dw,dh,P.wall);r(x-dw/2+1,y-2+1,dw-2,dh-2,P.door);
      r(x-dw/2+2,y,dw-4,1,P.doorH);r(x-3,y-2,6,dh,P.doorS);
    } else {
      r(x-2,y-dw/2,dh,dw,P.wall);r(x-2+1,y-dw/2+1,dh-2,dw-2,P.door);
      r(x,y-dw/2+2,1,dw-4,P.doorH);r(x-2,y-3,dh,6,P.doorS);
    }
  }
  door(300,0,false);door(100,180,true);door(300,180,true);door(500,180,true);
  door(400,90,false);door(600,90,false);door(600,270,false);door(700,180,true);
  door(100,360,true);door(250,440,false);door(490,360,true);

  // ── YARD ────────────────────────────────────────────────────────────────────

// ─── Sprites ──────────────────────────────────────────────────────────────────
function drawSprites() {
  for (const name of NAMES) {
    const s = sprites[name];
    // Snap on room change, lerp for in-room drift
    const dist = Math.hypot(s.tx - s.x, s.ty - s.y);
    if (dist > 80) { s.x = s.tx; s.y = s.ty; }
    else { s.x += (s.tx - s.x) * 0.15; s.y += (s.ty - s.y) * 0.15; }

    const color = CHAR_COLORS[name];

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

    // Draw avatar
    const drawer = AVATAR_DRAWERS[name];
    if (drawer) drawer(s.x, s.y);

    ctx.shadowBlur = 0;
  }
}

// ─── Bubbles ──────────────────────────────────────────────────────────────────
function wrapText(text, maxW) {
  ctx.font = '12px PingFang SC, sans-serif';
  const lines = [];
  let line = '';
  for (const ch of text) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line); line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function updateBubbles() {
  const overlay = document.getElementById('bubble-overlay');
  overlay.innerHTML = '';
  const now = Date.now();
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    if (now > b.expiry) { bubbles.splice(i, 1); continue; }
    const alpha = Math.min(1, (b.expiry - now) / 600);
    const color = CHAR_COLORS[b.name] || '#ccc';
    const div = document.createElement('div');
    div.className = 'html-bubble';
    div.style.left = Math.round(b.sx * currentScale) + 'px';
    div.style.borderColor = color;
    div.style.opacity = alpha;
    const rawTop = Math.round((b.sy - 44) * currentScale);
    if (rawTop < 80) {
      // 角色靠近顶部：气泡改到角色下方，箭头向上
      div.style.top = Math.round((b.sy + 24) * currentScale) + 'px';
      div.style.transform = 'translate(-50%, 0)';
      div.innerHTML = `<div class="bubble-tail" style="top:-8px;bottom:auto;border-top:none;border-bottom:8px solid rgba(18,12,4,0.92);border-left:6px solid transparent;border-right:6px solid transparent;position:absolute;left:50%;transform:translateX(-50%)"></div><div class="bubble-text">${b.text}</div>`;
    } else {
      div.style.top = rawTop + 'px';
      div.innerHTML = `<div class="bubble-text">${b.text}</div><div class="bubble-tail" style="border-top-color:rgba(18,12,4,0.92)"></div>`;
    }
    overlay.appendChild(div);
  }
}

// ─── HTML label overlay ───────────────────────────────────────────────────────
const labelEls = {};
function initLabels() {
  const overlay = document.getElementById('label-overlay');
  for (const name of NAMES) {
    const color = CHAR_COLORS[name];
    const wrap = document.createElement('div');
    wrap.className = 'char-label';
    const nameEl = document.createElement('div');
    nameEl.className = 'char-name';
    nameEl.textContent = name;
    nameEl.style.color = color;
    const moodEl = document.createElement('div');
    moodEl.className = 'char-mood';
    moodEl.style.color = color;
    moodEl.style.display = 'none';
    wrap.appendChild(nameEl);
    wrap.appendChild(moodEl);
    overlay.appendChild(wrap);
    labelEls[name] = { wrap, mood: moodEl, _mood: '' };
  }
}
function updateLabels() {
  for (const name of NAMES) {
    const s = sprites[name];
    const el = labelEls[name];
    el.wrap.style.left = Math.round(s.x * currentScale) + 'px';
    el.wrap.style.top = Math.round((s.y + 6) * currentScale) + 'px';
    if (s.mood !== el._mood) {
      el._mood = s.mood;
      el.mood.textContent = s.mood || '';
      el.mood.style.display = s.mood ? '' : 'none';
    }
  }
}
initLabels();

// ─── Render loop ──────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawFloorplan();
  drawSprites();
  updateLabels();
  updateBubbles();
  requestAnimationFrame(render);
}

const logPanel = document.getElementById('log-panel');

const statusEl = document.getElementById('status');

function addLog(html) {
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = html;
  logPanel.prepend(div);
  while (logPanel.children.length > 2000) logPanel.removeChild(logPanel.lastChild);
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
let activeWs = null;

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  activeWs = ws;

  ws.onopen = () => { statusEl.textContent = '已连接'; };
  ws.onclose = () => {
    activeWs = null;
    statusEl.textContent = '已断开，5秒后重连...';
    setTimeout(connect, 5000);
  };
  ws.onerror = () => { statusEl.textContent = '连接错误'; };
  ws.onmessage = ({ data }) => {
    try { handle(JSON.parse(data)); } catch (e) { console.error(e); }
  };
}

function handle(ev) {
  switch (ev.type) {
    case 'tick_start':
      simTimeEl.textContent = ev.sim_time;
      break;

    case 'agent_action': {
      const { name, room, action, dialogue, mood, thought } = ev;
      const s = sprites[name];
      if (!s) break;

      // Move sprite target to new room, then rebalance all chars in that room
      if (room && ROOMS[room]) {
        const prevRoom = s.room;
        s.room = room;
        s.tx = ROOMS[room].cx; s.ty = ROOMS[room].cy;
        rebalanceRoom(room);
        if (prevRoom && prevRoom !== room) rebalanceRoom(prevRoom);
      }
      if (mood) s.mood = mood;

      // Speech bubble
      if (dialogue && dialogue.trim()) {
        bubbles.push({ name, text: dialogue, sx: s.x, sy: s.y, expiry: Date.now() + BUBBLE_DURATION });
      }

      // Log
      const color = CHAR_COLORS[name] || '#aaa';
      addLog(
        `<span class="log-time">${simTimeEl.textContent}</span>` +
        `<span class="log-name" style="color:${color}">${name}</span>` +
        (thought ? `<span class="log-thought">${thought}</span>` : '') +
        (action ? `<span class="log-action">${action}</span>` : '') +
        (dialogue ? ` <span class="log-dialogue">「${dialogue}」</span>` : '') +
        (mood ? `<span class="log-mood">[${mood}]</span>` : '')
      );
      break;
    }

    case 'world_update':
      simTimeEl.textContent = ev.sim_time;
      if (ev.moods) {
        for (const [name, mood] of Object.entries(ev.moods)) {
          if (sprites[name]) sprites[name].mood = mood;
        }
      }
      if (ev.positions) {
        const movedRooms = new Set();
        for (const [name, room] of Object.entries(ev.positions)) {
          const s = sprites[name];
          if (s && ROOMS[room]) {
            if (s.room && s.room !== room) movedRooms.add(s.room);
            s.room = room;
            s.tx = ROOMS[room].cx; s.ty = ROOMS[room].cy;
            movedRooms.add(room);
          }
        }
        movedRooms.forEach(rebalanceRoom);
      }
      break;

    case 'agent_reaction': {
      const { name, dialogue, action, mood, in_reply_to } = ev;
      const s = sprites[name];
      if (s) {
        if (mood) s.mood = mood;
        if (dialogue && dialogue.trim()) {
          bubbles.push({ name, text: dialogue, sx: s.x, sy: s.y, expiry: Date.now() + BUBBLE_DURATION });
        }
      }
      const color = CHAR_COLORS[name] || '#aaa';
      addLog(
        `<span class="log-time">${simTimeEl.textContent}</span>` +
        `<span class="log-name" style="color:${color}">${name}</span>` +
        `<span style="color:#605040;font-size:10px"> 回应${in_reply_to}</span> ` +
        (action ? `<span class="log-action">${action}</span>` : '') +
        (dialogue ? ` <span class="log-dialogue">「${dialogue}」</span>` : '')
      );
      break;
    }

    case 'agent_plan': {
      const { name, plan } = ev;
      const color = CHAR_COLORS[name] || '#aaa';
      if (plan && plan.length) {
        addLog(
          `<span class="log-name" style="color:${color}">${name}</span>` +
          `<span style="color:#507050;font-size:10px"> 今晚计划：</span>` +
          `<span class="log-thought">${plan.slice(0,3).join(' / ')}</span>`
        );
      }
      break;
    }

    case 'narrative_event': {
      const { sim_time, description } = ev;
      addLog(`<span style="color:#f0c040;font-weight:bold">[${sim_time}] ★ ${description}</span>`);
      break;
    }

    case 'agent_reflection': {
      const { name, insights, sim_time } = ev;
      const color = CHAR_COLORS[name] || '#aaa';
      addLog(
        `<span class="log-time">${sim_time}</span>` +
        `<span class="log-name" style="color:${color}">${name}</span>` +
        `<span style="color:#806080;font-size:10px"> [反思] </span>` +
        `<span class="log-thought">${insights[0]}</span>`
      );
      break;
    }

    case 'planning_start':
      addLog(`<span class="log-system">— 角色规划今晚行程中... —</span>`);
      break;

    case 'simulation_end':
      statusEl.textContent = `模拟结束`;
      addLog(`<span class="log-system">—— 除夕夜结束 ${ev.sim_time} ——</span>`);
      break;
    case 'event_queued':
      addLog(`<span class="log-system">⚡ 事件已注入：${ev.description}</span>`);
      break;
    case 'news_fetching':
      addLog(`<span class="log-system">正在获取今日新闻...</span>`);
      break;
    case 'news_injected':
      btnNews.textContent = '今日新闻';
      btnNews.classList.remove('loading');
      addLog(`<span class="log-system">★ 新闻事件已注入：${ev.events.join(' / ')}</span>`);
      break;
    case 'news_error':
      btnNews.textContent = '今日新闻';
      btnNews.classList.remove('loading');
      addLog(`<span class="log-system" style="color:#c04040">新闻获取失败：${ev.error}</span>`);
      break;
  }
}

document.getElementById('btn-tick').addEventListener('click', () => {
  if (activeWs && activeWs.readyState === WebSocket.OPEN) {
    activeWs.send(JSON.stringify({ type: 'force_tick' }));
  }
});

let _paused = false;
const btnPause = document.getElementById('btn-pause');
btnPause.addEventListener('click', () => {
  if (!activeWs || activeWs.readyState !== WebSocket.OPEN) return;
  _paused = !_paused;
  activeWs.send(JSON.stringify({ type: _paused ? 'pause' : 'resume' }));
  btnPause.textContent = _paused ? '继续' : '暂停';
  btnPause.style.background = _paused ? '#7a3030' : '';
});

// ── 用户注入事件 ──────────────────────────────────────────────────────────────
const injectInput = document.getElementById('inject-input');
const btnInject = document.getElementById('btn-inject');

function doInject() {
  const desc = injectInput.value.trim();
  if (!desc || !activeWs || activeWs.readyState !== WebSocket.OPEN) return;
  activeWs.send(JSON.stringify({ type: 'inject_event', description: desc }));
  injectInput.value = '';
}
btnInject.addEventListener('click', doInject);
injectInput.addEventListener('keydown', e => { if (e.key === 'Enter') doInject(); });

// ── 今日新闻按钮 ──────────────────────────────────────────────────────────────
const btnNews = document.getElementById('btn-news');
btnNews.addEventListener('click', () => {
  if (!activeWs || activeWs.readyState !== WebSocket.OPEN) return;
  btnNews.textContent = '获取中...';
  btnNews.classList.add('loading');
  activeWs.send(JSON.stringify({ type: 'fetch_news' }));
});

document.getElementById('btn-export').addEventListener('click', () => {
  const entries = Array.from(logPanel.children).reverse(); // oldest first
  const lines = entries.map(el => el.innerText.replace(/\s+/g, ' ').trim()).filter(Boolean);
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `luoxiaohei_log_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.txt`;
  a.click();
});

connect();
</script>
</body>
</html>
